<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bluesky Search Viewer</title>
<style>
:root{color-scheme:light dark;--bg:#0f172a;--panel:#111827;--card:#0b1220;--text:#e5e7eb;--muted:#94a3b8;--line:#334155;--accent:#38bdf8;--danger:#fb7185;--soft:rgba(56,189,248,.14);--ok:#86efac;--warn:#fde68a}*{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:radial-gradient(circle at top left,rgba(56,189,248,.16),transparent 32rem),var(--bg);color:var(--text);line-height:1.65}main{width:min(980px,calc(100vw - 28px));margin:28px auto}h1{margin:0 0 6px;font-size:clamp(27px,6vw,42px)}p{margin:0;color:var(--muted)}.panel,.card{border:1px solid var(--line);background:rgba(17,24,39,.92);border-radius:18px;padding:16px;box-shadow:0 16px 42px rgba(0,0,0,.22)}.panel{margin-top:18px}.tabs,.toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center}.tabs{margin-bottom:14px}button,input,select{font:inherit;border:1px solid var(--line);border-radius:12px;background:var(--card);color:var(--text);padding:10px 12px}button{cursor:pointer}button.primary{background:var(--accent);color:#00111d;border-color:transparent;font-weight:800}button.tab[aria-selected=true]{border-color:var(--accent);box-shadow:inset 0 0 0 1px var(--accent)}button:disabled{opacity:.45;cursor:not-allowed}label{display:grid;gap:6px;color:var(--muted);font-size:13px}.main-field{border:1px solid var(--accent);background:var(--soft);border-radius:16px;padding:14px;margin-bottom:12px}.main-field input{width:100%;font-size:18px;padding:14px}.badge{display:inline-flex;align-items:center;border-radius:999px;padding:2px 8px;font-size:11px;font-weight:800;background:var(--accent);color:#00111d}.optional{background:transparent;color:var(--muted);border:1px solid var(--line);font-weight:500}.label-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.hint,.status,.scope{font-size:13px;color:var(--muted)}.scope strong{color:var(--text)}details{border:1px solid var(--line);border-radius:14px;background:rgba(11,18,32,.72);margin-top:12px}summary{cursor:pointer;padding:12px 14px;font-weight:800}details[open] summary{border-bottom:1px solid var(--line)}.details-body{padding:14px}.grid{display:grid;grid-template-columns:repeat(12,1fr);gap:12px;align-items:end}.s2{grid-column:span 2}.s3{grid-column:span 3}.s4{grid-column:span 4}.s6{grid-column:span 6}.s8{grid-column:span 8}.s12{grid-column:span 12}.hidden{display:none!important}.results{display:grid;gap:12px;margin-top:16px}.topline{display:flex;gap:10px;align-items:center;flex-wrap:wrap}.avatar{width:42px;height:42px;border-radius:50%;object-fit:cover;background:#1e293b}.name{font-weight:850;color:var(--text);text-decoration:none}.handle,.meta{color:var(--muted);font-size:13px}.meta{display:flex;gap:12px;flex-wrap:wrap}.text{white-space:pre-wrap;overflow-wrap:anywhere;margin:8px 0}.error{color:var(--danger);white-space:pre-wrap}.ok{color:var(--ok)}.warn{color:var(--warn)}.raw{width:100%;min-height:220px;overflow:auto;white-space:pre-wrap;word-break:break-word;font:12px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}.checkrow{display:flex;gap:8px;align-items:center;color:var(--muted);font-size:13px}.checkrow input{width:auto}.loginbox{border:1px solid var(--line);border-radius:14px;padding:12px;background:rgba(15,23,42,.64);margin-bottom:12px}a{color:var(--accent)}@media(max-width:760px){main{margin-top:18px}.grid{grid-template-columns:1fr}.s2,.s3,.s4,.s6,.s8,.s12{grid-column:span 1}}
</style>
</head>
<body>
<main>
<header>
<h1>Bluesky Search Viewer</h1>
<p>v3.0。ユーザー検索はそのまま、投稿検索は必要ならBlueskyログインを使います。</p>
</header>
<section class="panel">
<div class="tabs" role="tablist" aria-label="検索対象">
<button class="tab" type="button" data-mode="posts" aria-selected="true">投稿を検索</button>
<button class="tab" type="button" data-mode="actors" aria-selected="false">ユーザーを検索</button>
</div>
<form id="form">
<div class="main-field">
<label for="q"><span class="label-row">検索ワード <span class="badge">必須</span></span>
<input id="q" name="q" required autocomplete="off" placeholder="例: 猫" aria-describedby="help scope">
<span id="help" class="hint">ここだけ入れれば検索できます。from:〜 は入れなくて大丈夫です。</span></label>
<div id="scope" class="scope" aria-live="polite"></div>
</div>
<details id="settings"><summary>必要なときだけ開く設定</summary><div class="details-body">
<div class="loginbox posts-only">
<div class="label-row"><strong>投稿検索ログイン</strong><span id="loginState" class="badge optional">未ログイン</span></div>
<p class="hint" style="margin:6px 0 12px">投稿検索が失敗するとき用です。通常のパスワードではなく、Blueskyのアプリパスワードを入れてください。アプリパスワード自体は保存しません。</p>
<div class="grid">
<label class="s4" for="identifier">ハンドルまたはメール<input id="identifier" autocomplete="username" placeholder="example.bsky.social"></label>
<label class="s4" for="appPassword">アプリパスワード<input id="appPassword" type="password" autocomplete="current-password" placeholder="xxxx-xxxx-xxxx-xxxx"></label>
<label class="s4" for="pdsHost">PDS / ログイン先<input id="pdsHost" value="https://bsky.social" placeholder="https://bsky.social"></label>
<div class="s12 checkrow"><input id="saveSession" type="checkbox" checked><label for="saveSession" style="display:block">この端末にログイン状態を保存する</label></div>
<div class="s12 toolbar"><button type="button" id="loginBtn">ログイン</button><button type="button" id="logoutBtn">ログアウト</button><button type="button" id="testApi">通信テスト</button></div>
</div>
</div>
<div class="grid">
<label class="s6 posts-only" for="author"><span class="label-row">投稿者でしぼる <span class="badge optional">任意・自動保存</span></span><input id="author" name="author" autocomplete="off" placeholder="例: example.bsky.social"><span class="hint">一度入れるとこのブラウザに保存されます。</span></label>
<label class="s3" for="limit"><span class="label-row">表示件数 <span class="badge optional">任意</span></span><input id="limit" name="limit" type="number" min="1" max="100" value="25"></label>
<label class="s3 posts-only" for="sort"><span class="label-row">並び順 <span class="badge optional">任意</span></span><select id="sort" name="sort"><option value="latest">新しい順</option><option value="top">人気順</option></select></label>
<label class="s3 posts-only" for="mentions">メンション先<input id="mentions" name="mentions" placeholder="handle or did"></label>
<label class="s2 posts-only" for="lang">言語<input id="lang" name="lang" placeholder="ja / en"></label>
<label class="s2 posts-only" for="since">この日以降<input id="since" name="since" placeholder="2026-05-01"></label>
<label class="s2 posts-only" for="until">この日以前<input id="until" name="until" placeholder="2026-06-01"></label>
<label class="s4 posts-only" for="domain">リンク先ドメイン<input id="domain" name="domain" placeholder="example.com"></label>
<label class="s4 posts-only" for="url">リンクURL<input id="url" name="url" placeholder="https://example.com/page"></label>
<label class="s4 posts-only" for="tag">タグ<input id="tag" name="tag" placeholder="複数はカンマ区切り。#なし"></label>
</div>
<div class="toolbar posts-only" style="margin-top:12px"><button type="button" id="forget">保存した投稿者を消す</button></div>
</div></details>
<div class="toolbar" style="margin-top:14px"><button class="primary" type="submit">検索する</button><button type="button" id="next" disabled>次のページ</button><button type="button" id="clear">結果を消す</button><span id="status" class="status">待機中</span></div>
</form>
</section>
<section id="results" class="results" aria-live="polite"></section>
<details class="panel"><summary>開発用: 最後のレスポンスJSON</summary><div class="details-body"><pre id="raw" class="raw">{}</pre></div></details>
</main>
<script>
const PUBLIC_HOST='https://public.api.bsky.app/xrpc/';
const DEFAULT_PDS='https://bsky.social';
const KEY_AUTHOR='bsky-search-viewer.savedAuthor';
const KEY_SESSION='bsky-search-viewer.session';
const KEY_IDENTIFIER='bsky-search-viewer.identifier';
const KEY_PDS='bsky-search-viewer.pdsHost';
let mode='posts',cursor='',lastParams=null,session=null;
function $(id){return document.getElementById(id)}
const results=$('results'),statusEl=$('status'),raw=$('raw'),next=$('next'),scope=$('scope'),loginState=$('loginState');
function esc(v){return String(v==null?'':v).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]})}
function norm(v){return String(v||'').trim().replace(/^@/,'').replace(/^https:\/\/bsky\.app\/profile\//,'').replace(/\/+$/,'')}
function cleanHost(v){v=String(v||DEFAULT_PDS).trim().replace(/\/+$/,'');if(!/^https?:\/\//i.test(v))v='https://'+v;return v}
function pdsXrpc(){return cleanHost($('pdsHost').value||DEFAULT_PDS)+'/xrpc/'}
function saveSession(){if(session&&$('saveSession').checked)localStorage.setItem(KEY_SESSION,JSON.stringify(session));else localStorage.removeItem(KEY_SESSION)}
function loadSession(){try{session=JSON.parse(localStorage.getItem(KEY_SESSION)||'null')}catch(e){session=null}updateLoginState()}
function updateLoginState(){if(session&&session.accessJwt){loginState.textContent='ログイン中: @'+(session.handle||session.did||'');loginState.className='badge';}else{loginState.textContent='未ログイン';loginState.className='badge optional';}}
function updateScope(){if(mode!=='posts'){scope.innerHTML='現在は <strong>ユーザー検索</strong> です。名前やハンドルを検索ワードへ入れます。';return}var a=norm($('author').value||localStorage.getItem(KEY_AUTHOR));var login=session&&session.accessJwt?'ログイン中':'未ログイン';scope.innerHTML=(a?'現在は <strong>@'+esc(a)+'</strong> の投稿から検索します。':'現在は <strong>全体の投稿</strong> から検索します。')+' 投稿検索ログインは <strong>'+login+'</strong> です。'}
function setMode(m){mode=m;document.querySelectorAll('.tab').forEach(function(b){b.setAttribute('aria-selected',String(b.dataset.mode===mode))});document.querySelectorAll('.posts-only').forEach(function(e){e.classList.toggle('hidden',mode!=='posts')});cursor='';lastParams=null;next.disabled=true;updateScope()}
function pullFrom(q){var a='';var cleaned=String(q||'').replace(/(?:^|\s)from:([^\s]+)/ig,function(_,h){if(!a)a=norm(h);return ' '}).replace(/\s+/g,' ').trim();return {cleaned:cleaned,a:a}}
function postUrl(p){var r=(p.uri||'').split('/').pop();var h=p.author&&p.author.handle;return h&&r?'https://bsky.app/profile/'+encodeURIComponent(h)+'/post/'+encodeURIComponent(r):'https://bsky.app/'}
function profileUrl(a){return a&&a.handle?'https://bsky.app/profile/'+encodeURIComponent(a.handle):'https://bsky.app/'}
function params(fd){var q=(fd.get('q')||'').trim();if(mode==='posts'){var p=pullFrom(q);q=p.cleaned;if(p.a&&!$('author').value.trim())$('author').value=p.a;$('q').value=q}var ps=new URLSearchParams();ps.set('q',q);ps.set('limit',String(Math.max(1,Math.min(100,Number(fd.get('limit')||25)))));if(mode==='posts'){var a=norm($('author').value||fd.get('author'));if(a){localStorage.setItem(KEY_AUTHOR,a);$('author').value=a;ps.set('author',a)}['sort','mentions','lang','since','until','domain','url'].forEach(function(k){var v=(fd.get(k)||'').trim();if(v)ps.set(k,v)});String(fd.get('tag')||'').split(',').map(function(s){return s.trim().replace(/^#/,'')}).filter(Boolean).forEach(function(t){ps.append('tag',t)})}updateScope();return ps}
async function readJson(res){var text=await res.text();var data={};try{data=text?JSON.parse(text):{}}catch(e){data={raw:text}}return data}
async function requestJson(url,opt){opt=opt||{};opt.cache='no-store';if('AbortController' in window){var c=new AbortController();opt.signal=c.signal;var timer=setTimeout(function(){c.abort()},18000);try{var res=await fetch(url,opt);clearTimeout(timer);var data=await readJson(res);return {res:res,data:data,url:url}}catch(e){clearTimeout(timer);throw e}}var res=await fetch(url,opt);var data=await readJson(res);return {res:res,data:data,url:url}}
async function doLogin(){var identifier=$('identifier').value.trim();var password=$('appPassword').value.trim();var pds=cleanHost($('pdsHost').value);if(!identifier||!password){throw new Error('ハンドルまたはメールと、アプリパスワードを入れてください。')}localStorage.setItem(KEY_IDENTIFIER,identifier);localStorage.setItem(KEY_PDS,pds);var out=await requestJson(pds+'/xrpc/com.atproto.server.createSession',{method:'POST',headers:{'content-type':'application/json','accept':'application/json'},body:JSON.stringify({identifier:identifier,password:password})});raw.textContent=JSON.stringify({ok:out.res.ok,status:out.res.status,url:out.url,response:out.data},null,2);if(!out.res.ok)throw new Error('ログインに失敗しました。アプリパスワードかハンドルを確認してください。\n'+JSON.stringify(out.data,null,2));session={pds:pds,accessJwt:out.data.accessJwt,refreshJwt:out.data.refreshJwt,did:out.data.did,handle:out.data.handle};$('appPassword').value='';saveSession();updateLoginState();updateScope();return session}
async function refreshSession(){if(!session||!session.refreshJwt)throw new Error('ログインが必要です。');var pds=cleanHost(session.pds||$('pdsHost').value||DEFAULT_PDS);var out=await requestJson(pds+'/xrpc/com.atproto.server.refreshSession',{method:'POST',headers:{'authorization':'Bearer '+session.refreshJwt,'accept':'application/json'}});raw.textContent=JSON.stringify({ok:out.res.ok,status:out.res.status,url:out.url,response:out.data},null,2);if(!out.res.ok){session=null;saveSession();updateLoginState();updateScope();throw new Error('ログインの期限が切れました。もう一度ログインしてください。')}session={pds:pds,accessJwt:out.data.accessJwt,refreshJwt:out.data.refreshJwt,did:out.data.did,handle:out.data.handle};saveSession();updateLoginState();updateScope();return session}
async function callPublic(endpoint,ps){var url=PUBLIC_HOST+endpoint+'?'+ps.toString();var out=await requestJson(url,{method:'GET',mode:'cors',headers:{'accept':'application/json'}});raw.textContent=JSON.stringify({ok:out.res.ok,status:out.res.status,url:out.url,response:out.data},null,2);return out}
async function callAuthed(endpoint,ps,allowRefresh){if(!session||!session.accessJwt)throw new Error('投稿検索にはログインが必要です。設定を開いて、Blueskyのアプリパスワードでログインしてください。');var pds=cleanHost(session.pds||$('pdsHost').value||DEFAULT_PDS);var url=pds+'/xrpc/'+endpoint+'?'+ps.toString();var out=await requestJson(url,{method:'GET',mode:'cors',headers:{'accept':'application/json','authorization':'Bearer '+session.accessJwt}});raw.textContent=JSON.stringify({ok:out.res.ok,status:out.res.status,url:out.url,response:out.data},null,2);if(out.res.status===401&&allowRefresh!==false){await refreshSession();return callAuthed(endpoint,ps,false)}return out}
async function callXrpc(endpoint,ps){if(endpoint==='app.bsky.actor.searchActors'){var actorOut=await callPublic(endpoint,ps);if(actorOut.res.ok)return {data:actorOut.data,via:'public.api.bsky.app'};throw new Error('ユーザー検索に失敗しました。\n'+JSON.stringify(actorOut.data,null,2));}
if(session&&session.accessJwt){var authOut=await callAuthed(endpoint,ps,true);if(authOut.res.ok)return {data:authOut.data,via:(session.pds||DEFAULT_PDS)+' ログイン'};throw new Error('ログインありの投稿検索に失敗しました。\n'+JSON.stringify(authOut.data,null,2));}
var publicOut=await callPublic(endpoint,ps);if(publicOut.res.ok)return {data:publicOut.data,via:'public.api.bsky.app'};if(publicOut.res.status===401)throw new Error('投稿検索はログインが必要になっているようです。設定を開いて、Blueskyのアプリパスワードでログインしてください。\n\nユーザー検索は認証不要なので、ログインなしでも動きます。');throw new Error('投稿検索に失敗しました。設定の「投稿検索ログイン」を使うと通る場合があります。\n'+JSON.stringify(publicOut.data,null,2));}
async function search(ps,append){var endpoint=mode==='posts'?'app.bsky.feed.searchPosts':'app.bsky.actor.searchActors';statusEl.textContent='検索中…';statusEl.className='status';try{var out=await callXrpc(endpoint,ps);cursor=out.data.cursor||'';next.disabled=!cursor;render(out.data,!!append);var n=mode==='posts'?(out.data.posts||[]).length:(out.data.actors||[]).length;statusEl.textContent=n+'件表示'+(cursor?'・次ページあり':'')+'・'+out.via}catch(e){statusEl.textContent='エラー';statusEl.className='status error';results.innerHTML='<article class="card error">'+esc(e.message)+'</article>';next.disabled=true}}
function render(data,append){if(!append)results.innerHTML='';var items=mode==='posts'?(data.posts||[]):(data.actors||[]);if(!items.length&&!append){results.innerHTML='<article class="card">該当なし</article>';return}results.insertAdjacentHTML('beforeend',mode==='posts'?items.map(renderPost).join(''):items.map(renderActor).join(''))}
function renderPost(p){var a=p.author||{},r=p.record||{};var av=a.avatar?'<img class="avatar" src="'+esc(a.avatar)+'" alt="">':'<div class="avatar"></div>';return '<article class="card"><div class="topline">'+av+'<div><a class="name" href="'+esc(profileUrl(a))+'" target="_blank" rel="noreferrer">'+esc(a.displayName||a.handle||'unknown')+'</a><div class="handle">@'+esc(a.handle||'')+'</div></div></div><div class="text">'+esc(r.text||'')+'</div><div class="meta"><span>'+esc(r.createdAt||p.indexedAt||'')+'</span><span>返信 '+esc(p.replyCount||0)+'</span><span>リポスト '+esc(p.repostCount||0)+'</span><span>いいね '+esc(p.likeCount||0)+'</span><a href="'+esc(postUrl(p))+'" target="_blank" rel="noreferrer">bskyで開く</a></div></article>'}
function renderActor(a){var av=a.avatar?'<img class="avatar" src="'+esc(a.avatar)+'" alt="">':'<div class="avatar"></div>';return '<article class="card"><div class="topline">'+av+'<div><a class="name" href="'+esc(profileUrl(a))+'" target="_blank" rel="noreferrer">'+esc(a.displayName||a.handle||'unknown')+'</a><div class="handle">@'+esc(a.handle||'')+'</div></div></div><div class="text">'+esc(a.description||'')+'</div><div class="meta"><span>followers '+esc(a.followersCount==null?'-':a.followersCount)+'</span><span>follows '+esc(a.followsCount==null?'-':a.followsCount)+'</span><span>posts '+esc(a.postsCount==null?'-':a.postsCount)+'</span></div></article>'}
$('author').value=localStorage.getItem(KEY_AUTHOR)||'';$('identifier').value=localStorage.getItem(KEY_IDENTIFIER)||'';$('pdsHost').value=localStorage.getItem(KEY_PDS)||DEFAULT_PDS;loadSession();
document.querySelectorAll('.tab').forEach(function(b){b.addEventListener('click',function(){setMode(b.dataset.mode)})});
$('author').addEventListener('input',updateScope);$('author').addEventListener('change',function(){var a=norm($('author').value);if(a)localStorage.setItem(KEY_AUTHOR,a);$('author').value=a;updateScope()});
$('pdsHost').addEventListener('change',function(){var h=cleanHost($('pdsHost').value);$('pdsHost').value=h;localStorage.setItem(KEY_PDS,h)});
$('forget').addEventListener('click',function(){localStorage.removeItem(KEY_AUTHOR);$('author').value='';statusEl.textContent='保存した投稿者を消しました';updateScope()});
$('loginBtn').addEventListener('click',async function(){statusEl.textContent='ログイン中…';statusEl.className='status';try{await doLogin();statusEl.textContent='ログインしました';statusEl.className='status ok'}catch(e){statusEl.textContent='ログインエラー';statusEl.className='status error';results.innerHTML='<article class="card error">'+esc(e.message)+'</article>'}});
$('logoutBtn').addEventListener('click',function(){session=null;localStorage.removeItem(KEY_SESSION);updateLoginState();updateScope();statusEl.textContent='ログアウトしました'});
$('testApi').addEventListener('click',function(){var ps=new URLSearchParams();ps.set('q','test');ps.set('limit','1');search(ps,false)});
$('form').addEventListener('submit',function(e){e.preventDefault();cursor='';lastParams=params(new FormData(e.currentTarget));search(lastParams,false)});
next.addEventListener('click',function(){if(!lastParams||!cursor)return;var ps=new URLSearchParams(lastParams);ps.set('cursor',cursor);search(ps,true)});
$('clear').addEventListener('click',function(){cursor='';lastParams=null;next.disabled=true;results.innerHTML='';raw.textContent='{}';statusEl.textContent='待機中';$('q').value='';updateScope();$('q').focus()});
setMode('posts');
</script>
</body>
</html>
