<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bluesky Search Viewer</title>
<style>
:root{color-scheme:light dark;--bg:#0f172a;--panel:#111827;--card:#0b1220;--text:#e5e7eb;--muted:#94a3b8;--line:#334155;--accent:#38bdf8;--danger:#fb7185;--soft:rgba(56,189,248,.14);--ok:#86efac}*{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:radial-gradient(circle at top left,rgba(56,189,248,.16),transparent 32rem),var(--bg);color:var(--text);line-height:1.65}main{width:min(980px,calc(100vw - 28px));margin:28px auto}h1{margin:0 0 6px;font-size:clamp(27px,6vw,42px)}p{margin:0;color:var(--muted)}.panel,.card{border:1px solid var(--line);background:rgba(17,24,39,.92);border-radius:18px;padding:16px;box-shadow:0 16px 42px rgba(0,0,0,.22)}.panel{margin-top:18px}.tabs,.toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center}.tabs{margin-bottom:14px}button,input,select{font:inherit;border:1px solid var(--line);border-radius:12px;background:var(--card);color:var(--text);padding:10px 12px}button{cursor:pointer}button.primary{background:var(--accent);color:#00111d;border-color:transparent;font-weight:800}button.tab[aria-selected=true]{border-color:var(--accent);box-shadow:inset 0 0 0 1px var(--accent)}button:disabled{opacity:.45;cursor:not-allowed}label{display:grid;gap:6px;color:var(--muted);font-size:13px}.main-field{border:1px solid var(--accent);background:var(--soft);border-radius:16px;padding:14px;margin-bottom:12px}.main-field input{width:100%;font-size:18px;padding:14px}.badge{display:inline-flex;align-items:center;border-radius:999px;padding:2px 8px;font-size:11px;font-weight:800;background:var(--accent);color:#00111d}.optional{background:transparent;color:var(--muted);border:1px solid var(--line);font-weight:500}.label-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.hint,.status,.scope{font-size:13px;color:var(--muted)}.scope strong{color:var(--text)}details{border:1px solid var(--line);border-radius:14px;background:rgba(11,18,32,.72);margin-top:12px}summary{cursor:pointer;padding:12px 14px;font-weight:800}details[open] summary{border-bottom:1px solid var(--line)}.details-body{padding:14px}.grid{display:grid;grid-template-columns:repeat(12,1fr);gap:12px;align-items:end}.s2{grid-column:span 2}.s3{grid-column:span 3}.s4{grid-column:span 4}.s6{grid-column:span 6}.s12{grid-column:span 12}.hidden{display:none!important}.results{display:grid;gap:12px;margin-top:16px}.topline{display:flex;gap:10px;align-items:center;flex-wrap:wrap}.avatar{width:42px;height:42px;border-radius:50%;object-fit:cover;background:#1e293b}.name{font-weight:850;color:var(--text);text-decoration:none}.handle,.meta{color:var(--muted);font-size:13px}.meta{display:flex;gap:12px;flex-wrap:wrap}.text{white-space:pre-wrap;overflow-wrap:anywhere;margin:8px 0}.error{color:var(--danger);white-space:pre-wrap}.ok{color:var(--ok)}.raw{width:100%;min-height:220px;overflow:auto;white-space:pre-wrap;word-break:break-word;font:12px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}a{color:var(--accent)}@media(max-width:760px){main{margin-top:18px}.grid{grid-template-columns:1fr}.s2,.s3,.s4,.s6,.s12{grid-column:span 1}}
</style>
</head>
<body>
<main>
<header>
<h1>Bluesky Search Viewer</h1>
<p>v2.1。検索ワードだけ入れれば使えます。API通信が失敗したときは、自動で別の通信先も試します。</p>
</header>
<section class="panel">
<div class="tabs" role="tablist" aria-label="検索対象">
<button class="tab" type="button" data-mode="posts" aria-selected="true">投稿を検索</button>
<button class="tab" type="button" data-mode="actors" aria-selected="false">ユーザーを検索</button>
</div>
<form id="form">
<div class="main-field">
<label for="q"><span class="label-row">検索ワード <span class="badge">必須</span></span>
<input id="q" name="q" required autocomplete="off" placeholder="例: 猫" aria-describedby="help scope">
<span id="help" class="hint">ここだけ入れれば検索できます。from:〜 は入れなくて大丈夫です。</span></label>
<div id="scope" class="scope" aria-live="polite"></div>
</div>
<details id="settings"><summary>必要なときだけ開く設定</summary><div class="details-body"><div class="grid">
<label class="s6 posts-only" for="author"><span class="label-row">投稿者でしぼる <span class="badge optional">任意・自動保存</span></span><input id="author" name="author" autocomplete="off" placeholder="例: example.bsky.social"><span class="hint">一度入れるとこのブラウザに保存されます。</span></label>
<label class="s3" for="limit"><span class="label-row">表示件数 <span class="badge optional">任意</span></span><input id="limit" name="limit" type="number" min="1" max="100" value="25"></label>
<label class="s3 posts-only" for="sort"><span class="label-row">並び順 <span class="badge optional">任意</span></span><select id="sort" name="sort"><option value="latest">新しい順</option><option value="top">人気順</option></select></label>
<label class="s6" for="apiHost"><span class="label-row">通信先 <span class="badge optional">通常は自動</span></span><select id="apiHost"><option value="auto">自動で試す</option><option value="public">公式 public.api.bsky.app</option><option value="bsky">bsky.social</option></select><span class="hint">検索が失敗するときだけ切り替えてください。</span></label>
<label class="s3 posts-only" for="mentions">メンション先<input id="mentions" name="mentions" placeholder="handle or did"></label>
<label class="s2 posts-only" for="lang">言語<input id="lang" name="lang" placeholder="ja / en"></label>
<label class="s2 posts-only" for="since">この日以降<input id="since" name="since" placeholder="2026-05-01"></label>
<label class="s2 posts-only" for="until">この日以前<input id="until" name="until" placeholder="2026-06-01"></label>
<label class="s4 posts-only" for="domain">リンク先ドメイン<input id="domain" name="domain" placeholder="example.com"></label>
<label class="s4 posts-only" for="url">リンクURL<input id="url" name="url" placeholder="https://example.com/page"></label>
<label class="s4 posts-only" for="tag">タグ<input id="tag" name="tag" placeholder="複数はカンマ区切り。#なし"></label>
</div><div class="toolbar posts-only" style="margin-top:12px"><button type="button" id="forget">保存した投稿者を消す</button><button type="button" id="testApi">通信テスト</button></div></div></details>
<div class="toolbar" style="margin-top:14px"><button class="primary" type="submit">検索する</button><button type="button" id="next" disabled>次のページ</button><button type="button" id="clear">結果を消す</button><span id="status" class="status">待機中</span></div>
</form>
</section>
<section id="results" class="results" aria-live="polite"></section>
<details class="panel"><summary>開発用: 最後のレスポンスJSON</summary><div class="details-body"><pre id="raw" class="raw">{}</pre></div></details>
</main>
<script>
const HOSTS={public:'https://public.api.bsky.app/xrpc/',bsky:'https://bsky.social/xrpc/'};
const KEY_AUTHOR='bsky-search-viewer.savedAuthor';
const KEY_HOST='bsky-search-viewer.apiHost';
let mode='posts',cursor='',lastParams=null,lastEndpoint='';
function $(id){return document.getElementById(id)}
const results=$('results'),statusEl=$('status'),raw=$('raw'),next=$('next'),scope=$('scope');
function esc(v){return String(v==null?'':v).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]})}
function norm(v){return String(v||'').trim().replace(/^@/,'').replace(/^https:\/\/bsky\.app\/profile\//,'').replace(/\/+$/,'')}
function updateScope(){if(mode!=='posts'){scope.innerHTML='現在は <strong>ユーザー検索</strong> です。名前やハンドルを検索ワードへ入れます。';return}var a=norm($('author').value||localStorage.getItem(KEY_AUTHOR));scope.innerHTML=a?'現在は <strong>@'+esc(a)+'</strong> の投稿から検索します。変更したいときだけ設定を開いてください。':'現在は <strong>全体の投稿</strong> から検索します。投稿者でしぼる必要があるときだけ設定を開いてください。'}
function hostList(){var v=$('apiHost').value||'auto';localStorage.setItem(KEY_HOST,v);if(v==='public')return [HOSTS.public];if(v==='bsky')return [HOSTS.bsky];return [HOSTS.public,HOSTS.bsky]}
function setMode(m){mode=m;document.querySelectorAll('.tab').forEach(function(b){b.setAttribute('aria-selected',String(b.dataset.mode===mode))});document.querySelectorAll('.posts-only').forEach(function(e){e.classList.toggle('hidden',mode!=='posts')});cursor='';lastParams=null;next.disabled=true;updateScope()}
function pullFrom(q){var a='';var cleaned=String(q||'').replace(/(?:^|\s)from:([^\s]+)/ig,function(_,h){if(!a)a=norm(h);return ' '}).replace(/\s+/g,' ').trim();return {cleaned:cleaned,a:a}}
function postUrl(p){var r=(p.uri||'').split('/').pop();var h=p.author&&p.author.handle;return h&&r?'https://bsky.app/profile/'+encodeURIComponent(h)+'/post/'+encodeURIComponent(r):'https://bsky.app/'}
function profileUrl(a){return a&&a.handle?'https://bsky.app/profile/'+encodeURIComponent(a.handle):'https://bsky.app/'}
function params(fd){var q=(fd.get('q')||'').trim();if(mode==='posts'){var p=pullFrom(q);q=p.cleaned;if(p.a&&!$('author').value.trim())$('author').value=p.a;$('q').value=q}var ps=new URLSearchParams();ps.set('q',q);ps.set('limit',String(Math.max(1,Math.min(100,Number(fd.get('limit')||25)))));if(mode==='posts'){var a=norm($('author').value||fd.get('author'));if(a){localStorage.setItem(KEY_AUTHOR,a);$('author').value=a;ps.set('author',a)}['sort','mentions','lang','since','until','domain','url'].forEach(function(k){var v=(fd.get(k)||'').trim();if(v)ps.set(k,v)});String(fd.get('tag')||'').split(',').map(function(s){return s.trim().replace(/^#/,'')}).filter(Boolean).forEach(function(t){ps.append('tag',t)})}updateScope();return ps}
async function fetchText(url){var opt={method:'GET',mode:'cors',cache:'no-store'};if('AbortController' in window){var c=new AbortController();opt.signal=c.signal;var timer=setTimeout(function(){c.abort()},18000);try{var res=await fetch(url,opt);clearTimeout(timer);return res}catch(e){clearTimeout(timer);throw e}}return fetch(url,opt)}
async function callXrpc(endpoint,ps){var errors=[];var tried=[];for(const base of hostList()){var url=base+endpoint+'?'+ps.toString();tried.push(url);try{var res=await fetchText(url);var text=await res.text();var data={};try{data=text?JSON.parse(text):{}}catch(_){data={raw:text}}raw.textContent=JSON.stringify({ok:res.ok,status:res.status,host:base,url:url,response:data},null,2);if(res.ok)return {data:data,host:base,url:url};errors.push(base+' => HTTP '+res.status+' '+res.statusText+' '+(data.error||data.message||''))}catch(e){errors.push(base+' => '+(e.name||'Error')+': '+(e.message||'通信失敗'))}}
raw.textContent=JSON.stringify({ok:false,message:'all hosts failed',tried:tried,errors:errors},null,2);throw new Error('通信に失敗しました。ページを再読み込みしてもう一度検索してください。\n\n試した通信先:\n'+errors.join('\n')+'\n\n設定を開いて「通信先」を bsky.social に変えると通る場合があります。')}
async function search(ps,append){lastEndpoint=mode==='posts'?'app.bsky.feed.searchPosts':'app.bsky.actor.searchActors';statusEl.textContent='検索中…';statusEl.className='status';try{var out=await callXrpc(lastEndpoint,ps);cursor=out.data.cursor||'';next.disabled=!cursor;render(out.data,!!append);var n=mode==='posts'?(out.data.posts||[]).length:(out.data.actors||[]).length;statusEl.textContent=n+'件表示'+(cursor?'・次ページあり':'')+'・通信先 '+out.host.replace('https://','').replace('/xrpc/','')}catch(e){statusEl.textContent='エラー';statusEl.className='status error';results.innerHTML='<article class="card error">'+esc(e.message)+'</article>';next.disabled=true}}
function render(data,append){if(!append)results.innerHTML='';var items=mode==='posts'?(data.posts||[]):(data.actors||[]);if(!items.length&&!append){results.innerHTML='<article class="card">該当なし</article>';return}results.insertAdjacentHTML('beforeend',mode==='posts'?items.map(renderPost).join(''):items.map(renderActor).join(''))}
function renderPost(p){var a=p.author||{},r=p.record||{};var av=a.avatar?'<img class="avatar" src="'+esc(a.avatar)+'" alt="">':'<div class="avatar"></div>';return '<article class="card"><div class="topline">'+av+'<div><a class="name" href="'+esc(profileUrl(a))+'" target="_blank" rel="noreferrer">'+esc(a.displayName||a.handle||'unknown')+'</a><div class="handle">@'+esc(a.handle||'')+'</div></div></div><div class="text">'+esc(r.text||'')+'</div><div class="meta"><span>'+esc(r.createdAt||p.indexedAt||'')+'</span><span>返信 '+esc(p.replyCount||0)+'</span><span>リポスト '+esc(p.repostCount||0)+'</span><span>いいね '+esc(p.likeCount||0)+'</span><a href="'+esc(postUrl(p))+'" target="_blank" rel="noreferrer">bskyで開く</a></div></article>'}
function renderActor(a){var av=a.avatar?'<img class="avatar" src="'+esc(a.avatar)+'" alt="">':'<div class="avatar"></div>';return '<article class="card"><div class="topline">'+av+'<div><a class="name" href="'+esc(profileUrl(a))+'" target="_blank" rel="noreferrer">'+esc(a.displayName||a.handle||'unknown')+'</a><div class="handle">@'+esc(a.handle||'')+'</div></div></div><div class="text">'+esc(a.description||'')+'</div><div class="meta"><span>followers '+esc(a.followersCount==null?'-':a.followersCount)+'</span><span>follows '+esc(a.followsCount==null?'-':a.followsCount)+'</span><span>posts '+esc(a.postsCount==null?'-':a.postsCount)+'</span></div></article>'}
$('author').value=localStorage.getItem(KEY_AUTHOR)||'';$('apiHost').value=localStorage.getItem(KEY_HOST)||'auto';
document.querySelectorAll('.tab').forEach(function(b){b.addEventListener('click',function(){setMode(b.dataset.mode)})});
$('author').addEventListener('input',updateScope);$('author').addEventListener('change',function(){var a=norm($('author').value);if(a)localStorage.setItem(KEY_AUTHOR,a);$('author').value=a;updateScope()});
$('apiHost').addEventListener('change',function(){localStorage.setItem(KEY_HOST,$('apiHost').value);statusEl.textContent='通信先を保存しました'});
$('forget').addEventListener('click',function(){localStorage.removeItem(KEY_AUTHOR);$('author').value='';statusEl.textContent='保存した投稿者を消しました';updateScope()});
$('testApi').addEventListener('click',function(){var ps=new URLSearchParams();ps.set('q','test');ps.set('limit','1');search(ps,false)});
$('form').addEventListener('submit',function(e){e.preventDefault();cursor='';lastParams=params(new FormData(e.currentTarget));search(lastParams,false)});
next.addEventListener('click',function(){if(!lastParams||!cursor)return;var ps=new URLSearchParams(lastParams);ps.set('cursor',cursor);search(ps,true)});
$('clear').addEventListener('click',function(){cursor='';lastParams=null;next.disabled=true;results.innerHTML='';raw.textContent='{}';statusEl.textContent='待機中';$('q').value='';updateScope();$('q').focus()});
setMode('posts');
</script>
</body>
</html>
