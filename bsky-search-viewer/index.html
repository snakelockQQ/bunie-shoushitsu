<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bluesky Search Viewer</title>
<style>
:root{color-scheme:light dark;--bg:#0f172a;--panel:#111827;--card:#0b1220;--text:#e5e7eb;--muted:#94a3b8;--line:#334155;--accent:#38bdf8;--danger:#fb7185;--soft:rgba(56,189,248,.14)}*{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:radial-gradient(circle at top left,rgba(56,189,248,.16),transparent 32rem),var(--bg);color:var(--text);line-height:1.6}main{width:min(980px,calc(100vw - 28px));margin:28px auto}h1{margin:0 0 6px;font-size:clamp(27px,6vw,42px)}p{margin:0;color:var(--muted)}.panel,.card{border:1px solid var(--line);background:color-mix(in srgb,var(--panel),transparent 8%);border-radius:18px;padding:16px;box-shadow:0 16px 42px rgba(0,0,0,.22)}.panel{margin-top:18px}.tabs,.toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center}.tabs{margin-bottom:14px}button,input,select{font:inherit;border:1px solid var(--line);border-radius:12px;background:var(--card);color:var(--text);padding:10px 12px}button{cursor:pointer}button.primary{background:var(--accent);color:#00111d;border-color:transparent;font-weight:800}button.tab[aria-selected=true]{border-color:var(--accent);box-shadow:inset 0 0 0 1px var(--accent)}button:disabled{opacity:.45;cursor:not-allowed}label{display:grid;gap:6px;color:var(--muted);font-size:13px}.main-field{border:1px solid color-mix(in srgb,var(--accent),var(--line) 30%);background:var(--soft);border-radius:16px;padding:14px;margin-bottom:12px}.main-field input{width:100%;font-size:18px;padding:14px}.badge{display:inline-flex;align-items:center;border-radius:999px;padding:2px 8px;font-size:11px;font-weight:800;background:var(--accent);color:#00111d}.optional{background:transparent;color:var(--muted);border:1px solid var(--line);font-weight:500}.label-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.hint,.status,.scope{font-size:13px;color:var(--muted)}.scope strong{color:var(--text)}details{border:1px solid var(--line);border-radius:14px;background:color-mix(in srgb,var(--card),transparent 22%);margin-top:12px}summary{cursor:pointer;padding:12px 14px;font-weight:800}details[open] summary{border-bottom:1px solid var(--line)}.details-body{padding:14px}.grid{display:grid;grid-template-columns:repeat(12,1fr);gap:12px;align-items:end}.s2{grid-column:span 2}.s3{grid-column:span 3}.s4{grid-column:span 4}.s6{grid-column:span 6}.s12{grid-column:span 12}.hidden{display:none!important}.results{display:grid;gap:12px;margin-top:16px}.topline{display:flex;gap:10px;align-items:center;flex-wrap:wrap}.avatar{width:42px;height:42px;border-radius:50%;object-fit:cover;background:#1e293b}.name{font-weight:850;color:var(--text);text-decoration:none}.handle,.meta{color:var(--muted);font-size:13px}.meta{display:flex;gap:12px;flex-wrap:wrap}.text{white-space:pre-wrap;overflow-wrap:anywhere;margin:8px 0}.error{color:var(--danger);white-space:pre-wrap}.raw{width:100%;min-height:220px;overflow:auto;white-space:pre;font:12px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}a{color:var(--accent)}@media(max-width:760px){.grid{grid-template-columns:1fr}.s2,.s3,.s4,.s6,.s12{grid-column:span 1}}
</style>
</head>
<body>
<main>
<header><h1>Bluesky Search Viewer</h1><p>基本は検索ワードだけ入力します。投稿者や件数などは、必要なときだけ設定を開いて触れます。</p></header>
<section class="panel">
<div class="tabs" role="tablist" aria-label="検索対象"><button class="tab" type="button" data-mode="posts" aria-selected="true">投稿を検索</button><button class="tab" type="button" data-mode="actors" aria-selected="false">ユーザーを検索</button></div>
<form id="form">
<div class="main-field"><label for="q"><span class="label-row">検索ワード <span class="badge">必須</span></span><input id="q" name="q" required autocomplete="off" placeholder="例: 猫" aria-describedby="help scope"><span id="help" class="hint">ここだけ入れれば検索できます。from:〜 は入れなくて大丈夫です。</span></label><div id="scope" class="scope" aria-live="polite"></div></div>
<details id="settings"><summary>必要なときだけ開く設定</summary><div class="details-body"><div class="grid">
<label class="s6 posts-only" for="author"><span class="label-row">投稿者でしぼる <span class="badge optional">任意・自動保存</span></span><input id="author" name="author" autocomplete="off" placeholder="例: example.bsky.social"><span class="hint">一度入れるとこのブラウザに保存されます。</span></label>
<label class="s3" for="limit"><span class="label-row">表示件数 <span class="badge optional">任意</span></span><input id="limit" name="limit" type="number" min="1" max="100" value="25"></label>
<label class="s3 posts-only" for="sort"><span class="label-row">並び順 <span class="badge optional">任意</span></span><select id="sort" name="sort"><option value="latest">新しい順</option><option value="top">人気順</option></select></label>
<label class="s3 posts-only" for="mentions">メンション先<input id="mentions" name="mentions" placeholder="handle or did"></label><label class="s2 posts-only" for="lang">言語<input id="lang" name="lang" placeholder="ja / en"></label><label class="s2 posts-only" for="since">この日以降<input id="since" name="since" placeholder="2026-05-01"></label><label class="s2 posts-only" for="until">この日以前<input id="until" name="until" placeholder="2026-06-01"></label>
<label class="s4 posts-only" for="domain">リンク先ドメイン<input id="domain" name="domain" placeholder="example.com"></label><label class="s4 posts-only" for="url">リンクURL<input id="url" name="url" placeholder="https://example.com/page"></label><label class="s4 posts-only" for="tag">タグ<input id="tag" name="tag" placeholder="複数はカンマ区切り。#なし"></label>
</div><div class="toolbar posts-only" style="margin-top:12px"><button type="button" id="forget">保存した投稿者を消す</button></div></div></details>
<div class="toolbar" style="margin-top:14px"><button class="primary" type="submit">検索する</button><button type="button" id="next" disabled>次のページ</button><button type="button" id="clear">結果を消す</button><span id="status" class="status">待機中</span></div>
</form>
</section>
<section id="results" class="results" aria-live="polite"></section>
<details class="panel"><summary>開発用: 最後のレスポンスJSON</summary><div class="details-body"><pre id="raw" class="raw">{}</pre></div></details>
</main>
<script>
const API='https://public.api.bsky.app/xrpc/';const KEY='bsky-search-viewer.savedAuthor';let mode='posts',cursor='',lastParams=null;const $=id=>document.getElementById(id);const results=$('results'),statusEl=$('status'),raw=$('raw'),next=$('next'),scope=$('scope');function esc(v){return String(v??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}function norm(v){return String(v||'').trim().replace(/^@/,'').replace(/^https:\/\/bsky\.app\/profile\//,'').replace(/\/+$/,'')}function updateScope(){if(mode!=='posts'){scope.innerHTML='現在は <strong>ユーザー検索</strong> です。名前やハンドルを検索ワードへ入れます。';return}const a=norm($('author').value||localStorage.getItem(KEY));scope.innerHTML=a?`現在は <strong>@${esc(a)}</strong> の投稿から検索します。変更したいときだけ設定を開いてください。`:'現在は <strong>全体の投稿</strong> から検索します。投稿者でしぼる必要があるときだけ設定を開いてください。'}function setMode(m){mode=m;document.querySelectorAll('.tab').forEach(b=>b.setAttribute('aria-selected',String(b.dataset.mode===mode)));document.querySelectorAll('.posts-only').forEach(e=>e.classList.toggle('hidden',mode!=='posts'));cursor='';lastParams=null;next.disabled=true;updateScope()}function pullFrom(q){let a='';const cleaned=String(q||'').replace(/(?:^|\s)from:([^\s]+)/ig,(_,h)=>{if(!a)a=norm(h);return' '}).replace(/\s+/g,' ').trim();return{cleaned,a}}function postUrl(p){const r=(p.uri||'').split('/').pop(),h=p.author?.handle;return h&&r?`https://bsky.app/profile/${encodeURIComponent(h)}/post/${encodeURIComponent(r)}`:'https://bsky.app/'}function profileUrl(a){return a?.handle?`https://bsky.app/profile/${encodeURIComponent(a.handle)}`:'https://bsky.app/'}function params(fd){let q=(fd.get('q')||'').trim();if(mode==='posts'){const p=pullFrom(q);q=p.cleaned;if(p.a&&!$('author').value.trim())$('author').value=p.a;$('q').value=q}const ps=new URLSearchParams();ps.set('q',q);ps.set('limit',String(Math.max(1,Math.min(100,Number(fd.get('limit')||25)))));if(mode==='posts'){const a=norm($('author').value||fd.get('author'));if(a){localStorage.setItem(KEY,a);$('author').value=a;ps.set('author',a)}for(const k of ['sort','mentions','lang','since','until','domain','url']){const v=(fd.get(k)||'').trim();if(v)ps.set(k,v)}for(const t of String(fd.get('tag')||'').split(',').map(s=>s.trim().replace(/^#/,'')).filter(Boolean))ps.append('tag',t)}updateScope();return ps}async function search(ps,append=false){const ep=mode==='posts'?'app.bsky.feed.searchPosts':'app.bsky.actor.searchActors';statusEl.textContent='検索中…';statusEl.className='status';try{const res=await fetch(API+ep+'?'+ps.toString(),{headers:{accept:'application/json'}});const data=await res.json().catch(()=>({}));raw.textContent=JSON.stringify(data,null,2);if(!res.ok)throw new Error(`${res.status} ${res.statusText}\n${JSON.stringify(data,null,2)}`);cursor=data.cursor||'';next.disabled=!cursor;render(data,append);const n=mode==='posts'?(data.posts||[]).length:(data.actors||[]).length;statusEl.textContent=`${n}件表示${cursor?'・次ページあり':''}`}catch(e){statusEl.textContent='エラー';statusEl.className='status error';results.innerHTML=`<article class="card error">${esc(e.message)}</article>`;next.disabled=true}}function render(data,append){if(!append)results.innerHTML='';const items=mode==='posts'?(data.posts||[]):(data.actors||[]);if(!items.length&&!append){results.innerHTML='<article class="card">該当なし</article>';return}results.insertAdjacentHTML('beforeend',mode==='posts'?items.map(renderPost).join(''):items.map(renderActor).join(''))}function renderPost(p){const a=p.author||{},r=p.record||{},av=a.avatar?`<img class="avatar" src="${esc(a.avatar)}" alt="">`:'<div class="avatar"></div>';return`<article class="card"><div class="topline">${av}<div><a class="name" href="${esc(profileUrl(a))}" target="_blank" rel="noreferrer">${esc(a.displayName||a.handle||'unknown')}</a><div class="handle">@${esc(a.handle||'')}</div></div></div><div class="text">${esc(r.text||'')}</div><div class="meta"><span>${esc(r.createdAt||p.indexedAt||'')}</span><span>返信 ${esc(p.replyCount??0)}</span><span>リポスト ${esc(p.repostCount??0)}</span><span>いいね ${esc(p.likeCount??0)}</span><a href="${esc(postUrl(p))}" target="_blank" rel="noreferrer">bskyで開く</a></div></article>`}function renderActor(a){const av=a.avatar?`<img class="avatar" src="${esc(a.avatar)}" alt="">`:'<div class="avatar"></div>';return`<article class="card"><div class="topline">${av}<div><a class="name" href="${esc(profileUrl(a))}" target="_blank" rel="noreferrer">${esc(a.displayName||a.handle||'unknown')}</a><div class="handle">@${esc(a.handle||'')}</div></div></div><div class="text">${esc(a.description||'')}</div><div class="meta"><span>followers ${esc(a.followersCount??'-')}</span><span>follows ${esc(a.followsCount??'-')}</span><span>posts ${esc(a.postsCount??'-')}</span></div></article>`}
$('author').value=localStorage.getItem(KEY)||'';document.querySelectorAll('.tab').forEach(b=>b.addEventListener('click',()=>setMode(b.dataset.mode)));$('author').addEventListener('input',updateScope);$('author').addEventListener('change',()=>{const a=norm($('author').value);if(a)localStorage.setItem(KEY,a);$('author').value=a;updateScope()});$('forget').addEventListener('click',()=>{localStorage.removeItem(KEY);$('author').value='';statusEl.textContent='保存した投稿者を消しました';updateScope()});$('form').addEventListener('submit',e=>{e.preventDefault();cursor='';lastParams=params(new FormData(e.currentTarget));search(lastParams)});next.addEventListener('click',()=>{if(!lastParams||!cursor)return;const ps=new URLSearchParams(lastParams);ps.set('cursor',cursor);search(ps,true)});$('clear').addEventListener('click',()=>{cursor='';lastParams=null;next.disabled=true;results.innerHTML='';raw.textContent='{}';statusEl.textContent='待機中';$('q').value='';updateScope();$('q').focus()});setMode('posts');
</script>
</body>
</html>
